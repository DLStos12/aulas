<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>introdução Js</title>

    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Caixa de Alerta</h1>
    <p>
        <b>window.alert("Meu Primeiro JS");</b>
    </p>
    <p>
        Lembrando q Js não precisa de <b>;</b> no final
    </p>

    <img src="alert.png" alt="#">

    <hr>

    <h1>Caixa de confirmação</h1>
    <p>
        <b>window.confirm("Texto");</b>
    </p>

    <img src="cofirm.png" alt="#">

    <hr>

    <h1>Caixa de texto</h1>
    <p>
        <b>window.prompt("Texto");</b>
    </p>

    <img src="prompt.png" alt="#">

    <hr>

    <h1>Codigo</h1>

    <img src="code.png" alt="#" style="width: 40% ;">

    <script>
        window.alert("Meu Primeiro JS");
        window.confirm("Está Gostando de JS?")
        window.prompt("Qual seu nome?")
    </script> 
</body>
</html>
